services:
  db:
    image: postgres:16
    container_name: scheduling_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_dev_password
      POSTGRES_DB: scheduling
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d scheduling"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: scheduling_mail
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata: